<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangrove Carbon Detection - Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: url('/static/mangrovehomescreenwallpaper.jpg') center/cover no-repeat fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 50px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 32px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .form-helper {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn-primary {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .submit-btn-primary:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .submit-btn-primary:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0 20px;
            color: rgba(255, 255, 255, 0.3);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider-text {
            padding: 0 10px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .toggle-text {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .toggle-link {
            color: rgba(255, 255, 255, 1);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-link:hover {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: underline;
        }

        .error-box {
            display: none;
            background: #fed7d7;
            border: 1px solid #fc8181;
            color: #c53030;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-box {
            display: none;
            background: #c6f6d5;
            border: 1px solid #9ae6b4;
            color: #22543d;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #e2e8f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .brand-title {
                font-size: 24px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Brand Section -->
        <div class="brand-section">
            <div class="brand-icon">
                <img src="/static/logo.png" alt="Mangrove Carbon Logo">
            </div>
            <div class="brand-title">Mangrove Carbon</div>
            <div class="brand-subtitle">Detect & Estimate Mangrove Carbon Stocks</div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="loading">
            <div class="spinner"></div>
            <p class="text-gray-600">Processing...</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="">
            <div id="loginError" class="error-box"></div>
            <div id="loginSuccess" class="success-box"></div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input 
                    type="text" 
                    id="loginUsername" 
                    class="form-input" 
                    placeholder="Enter your username" 
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    class="form-input" 
                    placeholder="Enter your password" 
                    required
                >
            </div>

            <button type="submit" class="submit-btn submit-btn-primary">
                <i class="fas fa-sign-in-alt mr-2"></i>Login
            </button>

            <div class="divider">
                <span class="divider-text">New here?</span>
            </div>

            <div class="toggle-text">
                Don't have an account? 
                <span class="toggle-link" id="switchToSignup">Sign up</span>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden">
            <div id="signupError" class="error-box"></div>
            <div id="signupSuccess" class="success-box"></div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input 
                    type="text" 
                    id="signupUsername" 
                    class="form-input" 
                    placeholder="Choose a username" 
                    required
                >
                <div class="form-helper">At least 3 characters, letters and numbers only</div>
            </div>

            <div class="form-group">
                <label class="form-label">Email (Optional)</label>
                <input 
                    type="email" 
                    id="signupEmail" 
                    class="form-input" 
                    placeholder="your@email.com"
                >
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input 
                    type="password" 
                    id="signupPassword" 
                    class="form-input" 
                    placeholder="At least 6 characters" 
                    required
                >
                <div class="form-helper">Use a mix of letters, numbers, and symbols</div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input 
                    type="password" 
                    id="signupConfirmPassword" 
                    class="form-input" 
                    placeholder="Confirm your password" 
                    required
                >
            </div>

            <button type="submit" class="submit-btn submit-btn-primary">
                <i class="fas fa-user-plus mr-2"></i>Create Account
            </button>

            <div class="divider">
                <span class="divider-text">Already registered?</span>
            </div>

            <div class="toggle-text">
                Have an account? 
                <span class="toggle-link" id="switchToLogin">Login</span>
            </div>
        </form>
    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const switchToSignup = document.getElementById('switchToSignup');
        const switchToLogin = document.getElementById('switchToLogin');
        const loadingState = document.getElementById('loadingState');

        // Form Fields
        const loginUsername = document.getElementById('loginUsername');
        const loginPassword = document.getElementById('loginPassword');
        const signupUsername = document.getElementById('signupUsername');
        const signupPassword = document.getElementById('signupPassword');
        const signupConfirmPassword = document.getElementById('signupConfirmPassword');

        // Error/Success Messages
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const signupError = document.getElementById('signupError');
        const signupSuccess = document.getElementById('signupSuccess');

        // Utility Functions
        function showError(element, message) {
            element.textContent = '❌ ' + message;
            element.classList.remove('hidden');
            element.style.display = 'block';
        }

        function hideError(element) {
            element.classList.add('hidden');
            element.style.display = 'none';
        }

        function showSuccess(element, message) {
            element.textContent = '✅ ' + message;
            element.classList.remove('hidden');
            element.style.display = 'block';
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loadingState.style.display = 'flex';
                loadingState.style.flexDirection = 'column';
                loadingState.style.alignItems = 'center';
                loadingState.style.justifyContent = 'center';
                loginForm.style.display = 'none';
                signupForm.style.display = 'none';
            } else {
                loadingState.style.display = 'none';
                if (loginForm.classList.contains('hidden')) {
                    signupForm.style.display = 'block';
                } else {
                    loginForm.style.display = 'block';
                }
            }
        }

        function switchForms(showSignup) {
            if (showSignup) {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                hideError(signupError);
            } else {
                signupForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                signupForm.style.display = 'none';
                loginForm.style.display = 'block';
                hideError(loginError);
            }
        }

        // Event Listeners
        switchToSignup.addEventListener('click', (e) => {
            e.preventDefault();
            switchForms(true);
        });

        switchToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            switchForms(false);
        });

        // Login Handler
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(loginError);

            const username = loginUsername.value.trim();
            const password = loginPassword.value;

            if (!username || !password) {
                showError(loginError, 'Please fill in all fields');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    setLoading(false);
                    showError(loginError, data.error || 'Login failed. Please try again.');
                    return;
                }

                showSuccess(loginSuccess, `Welcome back, ${data.username}!`);
                
                // Store username in localStorage for UI display
                localStorage.setItem('userName', data.username);
                
                // Verify session before redirecting (give browser time to process Set-Cookie)
                setTimeout(async () => {
                    try {
                        const authCheck = await fetch('/auth_status', {
                            credentials: 'include'
                        });
                        const authData = await authCheck.json();
                        console.log('Auth status after login:', authData);
                        
                        if (authData.authenticated) {
                            window.location.href = '/';
                        } else {
                            showError(loginError, 'Session not established. Please try again.');
                            setLoading(false);
                        }
                    } catch (e) {
                        console.error('Auth check error:', e);
                        window.location.href = '/';
                    }
                }, 1000);

            } catch (error) {
                setLoading(false);
                showError(loginError, 'Network error: ' + (error.message || error));
            }
        });

        // Signup Handler
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError(signupError);

            const username = signupUsername.value.trim();
            const password = signupPassword.value;
            const confirmPassword = signupConfirmPassword.value;

            // Validation
            if (!username || !password || !confirmPassword) {
                showError(signupError, 'Please fill in all required fields');
                return;
            }

            if (username.length < 3) {
                showError(signupError, 'Username must be at least 3 characters');
                return;
            }

            if (!/^[a-zA-Z0-9_-]+$/.test(username)) {
                showError(signupError, 'Username can only contain letters, numbers, underscores, and hyphens');
                return;
            }

            if (password.length < 6) {
                showError(signupError, 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError(signupError, 'Passwords do not match');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        password, 
                        confirm_password: confirmPassword 
                    }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    setLoading(false);
                    showError(signupError, data.error || 'Signup failed. Please try again.');
                    return;
                }

                showSuccess(signupSuccess, `Welcome, ${data.username}! Account created successfully.`);
                
                // Store username in localStorage for UI display
                localStorage.setItem('userName', data.username);
                
                // Verify session before redirecting (give browser time to process Set-Cookie)
                setTimeout(async () => {
                    try {
                        const authCheck = await fetch('/auth_status', {
                            credentials: 'include'
                        });
                        const authData = await authCheck.json();
                        console.log('Auth status after signup:', authData);
                        
                        if (authData.authenticated) {
                            window.location.href = '/';
                        } else {
                            showError(signupError, 'Session not established. Please try again.');
                            setLoading(false);
                        }
                    } catch (e) {
                        console.error('Auth check error:', e);
                        window.location.href = '/';
                    }
                }, 1000);

            } catch (error) {
                setLoading(false);
                showError(signupError, 'Network error: ' + (error.message || error));
            }
        });

        // Check if already authenticated on page load
        async function checkAuth() {
            try {
                const response = await fetch('/auth_status');
                const data = await response.json();
                
                if (data.authenticated) {
                    // Already logged in, redirect to home
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Auth check failed:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
</body>
</html>
